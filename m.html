<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D-Flix Media Player - Pro Dynamic Player</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.30.0/Dropbox-sdk.min.js"></script>

    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

        .movie-card:hover .play-overlay { opacity: 1; transform: scale(1); }
        .movie-backdrop { transform: scale(1); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .movie-card:hover .movie-backdrop { transform: scale(1.06); }

        :root {
            --plyr-color-main: #ef4444;
            --plyr-video-background: #000000;
            --plyr-menu-background: #09090b;
            --plyr-menu-color: #f4f4f5;
        }
        .plyr {
            height: 100%;
            width: 100%;
        }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans h-screen overflow-hidden select-none">

    <div id="app-dashboard" class="flex flex-col h-full w-full">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 px-6 py-4 bg-black border-b border-zinc-900 backdrop-blur-2xl z-40">
            <div class="flex items-center justify-between md:justify-start gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-black text-red-600 tracking-tighter">D-FLIX</span>
                    <span class="text-[9px] bg-red-950/40 text-red-400 font-bold px-1.5 py-0.5 rounded border border-red-900/40">DIRECT STREAM</span>
                </div>
                <span id="current-path" class="text-xs bg-zinc-950 px-3 py-1.5 rounded-xl text-zinc-400 font-mono border border-zinc-900 max-w-xs truncate">/root</span>
            </div>
            
            <div class="flex items-center flex-1 max-w-md mx-0 md:mx-6 relative">
                <span class="material-icons absolute left-3 text-zinc-500 text-sm">search</span>
                <input id="search-bar" type="text" placeholder="Search title name, files or nodes..." class="w-full bg-zinc-950 text-xs px-9 py-2.5 rounded-xl border border-zinc-900 focus:outline-none focus:border-red-600 transition font-medium text-zinc-300">
            </div>

            <div class="flex bg-zinc-950 p-1 rounded-xl border border-zinc-900">
                <button id="btn-list-view" class="p-1.5 rounded-lg hover:bg-zinc-900 text-zinc-500 hover:text-white transition cursor-pointer">
                    <span class="material-icons text-base block">view_list</span>
                </button>
                <button id="btn-grid-view" class="p-1.5 rounded-lg bg-zinc-900 text-red-500 transition cursor-pointer">
                    <span class="material-icons text-base block">grid_view</span>
                </button>
            </div>
        </header>

        <div class="px-6 py-3 bg-black border-b border-zinc-900 flex gap-2 overflow-x-auto">
            <button class="category-tab active bg-red-600 text-white text-xs px-4 py-1.5 rounded-full font-bold shadow-lg shadow-red-600/20 transition cursor-pointer" data-filter="all">All Content</button>
            <button class="category-tab bg-zinc-950 hover:bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-4 py-1.5 rounded-full font-semibold border border-zinc-900 transition cursor-pointer" data-filter="video">Movies & Videos</button>
            <button class="category-tab bg-zinc-950 hover:bg-zinc-900 text-zinc-400 hover:text-zinc-200 text-xs px-4 py-1.5 rounded-full font-semibold border border-zinc-900 transition cursor-pointer" data-filter="folder">Folders</button>
        </div>

        <main class="flex-1 overflow-y-auto p-6 bg-gradient-to-b from-black to-zinc-950">
            <button id="btn-back-dir" class="hidden mb-6 flex items-center gap-2 text-xs font-bold text-zinc-400 hover:text-white transition bg-zinc-950 border border-zinc-900 px-4 py-2 rounded-xl cursor-pointer">
                <span class="material-icons text-sm">arrow_back</span> Back to Previous Folder
            </button>

            <div id="list-view-container" class="hidden flex flex-col gap-2 max-w-6xl mx-auto"></div>
            <div id="grid-view-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6"></div>
        </main>
    </div>

    <div id="video-player-screen" class="hidden fixed inset-0 bg-black z-50 flex flex-col justify-between overflow-hidden">
        <div id="player-top-bar" class="flex items-center justify-between bg-gradient-to-b from-black via-black/80 to-transparent px-6 py-6 absolute top-0 left-0 w-full z-30 transition-opacity duration-300">
            <div class="flex items-center gap-4 max-w-xl">
                <button id="btn-close-player" class="p-2.5 rounded-xl bg-zinc-950/80 border border-zinc-900 text-white transition active:scale-95 cursor-pointer">
                    <span class="material-icons block">arrow_back</span>
                </button>
                <h2 id="player-video-title" class="text-sm font-black tracking-wide text-zinc-100 truncate uppercase">Stream Engine Video</h2>
            </div>
            <div class="text-[10px] font-mono font-bold bg-red-600/10 text-red-500 border border-red-500/20 px-3 py-1 rounded-md">
                DIRECT HYBRID PLYR
            </div>
        </div>

        <div class="w-full h-full flex items-center justify-center z-10">
            <video id="main-video-element" class="w-full h-full object-contain" playsinline controls></video>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const DROPBOX_APP_KEY = 'ji9qtf5nctzae7n';
        const DROPBOX_APP_SECRET = '87kj0rpyzwmb06z';
        const DROPBOX_REFRESH_TOKEN = 'PIEBZ5q2Q8IAAAAAAAAAAVVaGtI8BELQB3NTXTbSwNYjV8oWvieLLRedN72Y0HJl';
        const TMDB_API_KEY = 'YOUR_TMDB_API_KEY_HERE'; 

        let dbx;
        let plyrInstance;
        let currentFolderHistory = [];
        let currentPath = "";
        let currentViewMode = "grid"; 
        let currentFetchedItems = [];
        let globalCategoryFilter = "all";

        const posterGradients = [
            'from-zinc-900 to-black', 'from-red-950/40 to-black', 
            'from-indigo-950/40 to-black', 'from-emerald-950/40 to-black'
        ];

        function initPlyrCoreEngine() {
            if (!plyrInstance) {
                plyrInstance = new Plyr('#main-video-element', {
                    controls: [
                        'play-large', 'play', 'progress', 'current-time', 
                        'duration', 'mute', 'volume', 'captions', 
                        'settings', 'pip', 'fullscreen'
                    ],
                    settings: ['quality', 'speed'],
                    speed: { selected: 1, options: [0.5, 1, 1.25, 1.5, 2] }
                });

                plyrInstance.on('controlshidden', () => {
                    document.getElementById('player-top-bar').style.opacity = '0';
                });
                plyrInstance.on('controlsshown', () => {
                    document.getElementById('player-top-bar').style.opacity = '1';
                });
            }
        }

        async function fetchFreshAccessToken() {
            try {
                const response = await fetch('https://api.dropbox.com/oauth2/token', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa(DROPBOX_APP_KEY + ':' + DROPBOX_APP_SECRET), 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 'grant_type': 'refresh_token', 'refresh_token': DROPBOX_REFRESH_TOKEN })
                });
                const data = await response.json();
                return data.access_token || null;
            } catch (error) { return null; }
        }

        async function fetchMoviePosterFromCloud(movieName) {
            let searchTitle = movieName.replace(/\.[^/.]+$/, "").replace(/[^a-zA-Z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
            const garbageWords = ["1080p", "720p", "4k", "bluray", "webrip", "dual", "audio", "hindi", "english"];
            let queryArray = searchTitle.split(" ").filter(word => !garbageWords.includes(word.toLowerCase()));
            let finalQuery = queryArray.slice(0, 4).join(" ");

            if (TMDB_API_KEY && TMDB_API_KEY !== 'YOUR_TMDB_API_KEY_HERE') {
                try {
                    const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(finalQuery)}`);
                    const data = await res.json();
                    if (data.results && data.results.length > 0 && data.results[0].poster_path) {
                        return `https://image.tmdb.org/t/p/w500${data.results[0].poster_path}`;
                    }
                } catch(e) {}
            }
            return `https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500&auto=format&fit=crop`;
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const appDashboard = document.getElementById("app-dashboard");
            const pathDisplay = document.getElementById("current-path");
            const btnBackDir = document.getElementById("btn-back-dir");
            const searchBar = document.getElementById("search-bar");

            const btnListView = document.getElementById("btn-list-view");
            const btnGridView = document.getElementById("btn-grid-view");
            const listViewContainer = document.getElementById("list-view-container");
            const gridViewContainer = document.getElementById("grid-view-container");

            const videoPlayerScreen = document.getElementById("video-player-screen");
            const mainVideoElement = document.getElementById("main-video-element");
            const playerVideoTitle = document.getElementById("player-video-title");
            const btnClosePlayer = document.getElementById("btn-close-player");

            const freshToken = await fetchFreshAccessToken();
            if (!freshToken) return;

            dbx = new Dropbox.Dropbox({ accessToken: freshToken });
            fetchDropboxFiles("");

            function fetchDropboxFiles(path) {
                currentPath = path;
                pathDisplay.innerText = path === "" ? "/root" : path;
                btnBackDir.classList.toggle("hidden", path === "");

                dbx.filesListFolder({ path: path })
                    .then((response) => {
                        currentFetchedItems = response.result.entries;
                        processAndRenderUI();
                    });
            }

            function processAndRenderUI() {
                const searchString = searchBar.value.toLowerCase().trim();
                const filteredItems = currentFetchedItems.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(searchString);
                    const isFolder = item[".tag"] === "folder";
                    if (!matchesSearch) return false;
                    if (globalCategoryFilter === "folder") return isFolder;
                    if (globalCategoryFilter === "video") return !isFolder;
                    return true;
                });
                renderMediaEngine(filteredItems);
            }

            function renderMediaEngine(items) {
                listViewContainer.innerHTML = ""; gridViewContainer.innerHTML = "";

                items.forEach((item, index) => {
                    const isFolder = item[".tag"] === "folder";
                    const fileExt = isFolder ? "" : item.name.split('.').pop().toLowerCase();
                    const isVideo = ["mp4", "mkv", "avi", "mov", "webm"].includes(fileExt);

                    if (!isFolder && !isVideo) return;

                    let cleanName = item.name.replace(/\.[^/.]+$/, "").replace(/[\._]/g, " ");
                    const cardGrad = posterGradients[index % posterGradients.length];

                    const gridCard = document.createElement("div");
                    gridCard.className = "movie-card bg-zinc-950 border border-zinc-900 rounded-2xl overflow-hidden cursor-pointer relative group flex flex-col justify-between shadow-2xl hover:border-zinc-800 transition duration-300";
                    
                    if (isFolder) {
                        gridCard.innerHTML = `
                            <div class="aspect-[2/3] bg-gradient-to-br ${cardGrad} p-4 flex flex-col justify-between relative">
                                <span class="material-icons text-amber-500 text-4xl">folder</span>
                                <div class="bg-black/60 backdrop-blur-md p-2.5 rounded-xl border border-zinc-900">
                                    <p class="text-xs font-bold text-zinc-200 line-clamp-2">${cleanName}</p>
                                </div>
                            </div>`;
                        gridCard.addEventListener("click", () => triggerFolderNavigation(item.path_lower));
                    } else {
                        gridCard.innerHTML = `
                            <div class="aspect-[2/3] bg-zinc-900 relative overflow-hidden">
                                <img id="poster-${index}" src="" class="movie-backdrop w-full h-full object-cover absolute inset-0 opacity-40 group-hover:opacity-60 transition duration-500">
                                <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent z-10"></div>
                                <div class="play-overlay absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 scale-90 transition-all duration-300 z-20">
                                    <span class="material-icons text-red-600 text-5xl drop-shadow-[0_0_15px_rgba(239,68,68,0.4)]">play_circle_filled</span>
                                </div>
                                <div class="absolute bottom-0 left-0 w-full p-4 z-20">
                                    <p class="text-xs font-black text-zinc-100 line-clamp-2 uppercase">${cleanName}</p>
                                </div>
                            </div>`;
                        gridCard.addEventListener("click", () => triggerDirectStream(item));
                        fetchMoviePosterFromCloud(item.name).then(imgUrl => {
                            const imgEl = document.getElementById(`poster-${index}`);
                            if(imgEl) imgEl.src = imgUrl;
                        });
                    }
                    gridViewContainer.appendChild(gridCard);

                    const listRow = document.createElement("div");
                    listRow.className = "flex items-center justify-between p-3.5 bg-zinc-950 border border-zinc-900 hover:border-zinc-800 rounded-xl cursor-pointer transition group";
                    listRow.innerHTML = `
                        <div class="flex items-center gap-4 min-w-0">
                            <span class="material-icons ${isFolder ? 'text-amber-500 bg-amber-500/5' : 'text-red-500 bg-red-500/5'} p-2.5 rounded-xl text-xl border border-zinc-900">${isFolder ? 'folder' : 'movie'}</span>
                            <div class="truncate">
                                <p class="text-xs font-bold text-zinc-200 truncate group-hover:text-red-500 transition uppercase">${cleanName}</p>
                            </div>
                        </div>
                        <span class="material-icons text-zinc-600 text-sm pr-2 group-hover:translate-x-1 transition duration-200">${isFolder ? 'chevron_right' : 'play_arrow'}</span>
                    `;
                    listRow.addEventListener("click", () => isFolder ? triggerFolderNavigation(item.path_lower) : triggerDirectStream(item));
                    listViewContainer.appendChild(listRow);
                });

                gridViewContainer.classList.toggle("hidden", currentViewMode !== "grid");
                listViewContainer.classList.toggle("hidden", currentViewMode === "grid");
            }

            function triggerFolderNavigation(pathLower) {
                currentFolderHistory.push(currentPath);
                fetchDropboxFiles(pathLower);
            }

            // Direct Video Streaming Action Core Pipeline Trigger
            function triggerDirectStream(item) {
                dbx.filesGetTemporaryLink({ path: item.path_lower })
                    .then((res) => {
                        let cleanLink = res.result.link;
                        if(cleanLink.includes("?dl=0")) cleanLink = cleanLink.replace("?dl=0", "?dl=1");

                        playerVideoTitle.innerText = item.name.replace(/\.[^/.]+$/, "");
                        videoPlayerScreen.classList.remove("hidden");
                        
                        initPlyrCoreEngine();
                        
                        plyrInstance.source = {
                            type: 'video',
                            title: item.name,
                            sources: [{ src: cleanLink, type: 'video/mp4' }]
                        };
                        plyrInstance.play();
                    }).catch(() => alert("Error resolving dynamic link buffer node."));
            }

            btnBackDir.addEventListener("click", () => {
                if (currentFolderHistory.length > 0) fetchDropboxFiles(currentFolderHistory.pop());
            });

            searchBar.addEventListener("input", processAndRenderUI);

            document.querySelectorAll(".category-tab").forEach(tab => {
                tab.addEventListener("click", () => {
                    document.querySelectorAll(".category-tab").forEach(t => t.className = "category-tab bg-zinc-950 text-zinc-500 text-xs px-4 py-1.5 rounded-full font-semibold border border-zinc-900 cursor-pointer transition");
                    tab.className = "category-tab bg-red-600 text-white text-xs px-4 py-1.5 rounded-full font-bold shadow-lg shadow-red-600/20 cursor-pointer transition";
                    globalCategoryFilter = tab.getAttribute("data-filter");
                    processAndRenderUI();
                });
            });

            btnClosePlayer.addEventListener("click", () => {
                if (plyrInstance) plyrInstance.stop();
                videoPlayerScreen.classList.add("hidden");
            });

            btnListView.addEventListener("click", () => { currentViewMode = "list"; processAndRenderUI(); });
            btnGridView.addEventListener("click", () => { currentViewMode = "grid"; processAndRenderUI(); });
        });
    </script>
</body>
</html>
