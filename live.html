<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DFlix - Source</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; }
        video { width: 80%; max-width: 400px; border: 2px solid #0f0; border-radius: 15px; box-shadow: 0 0 20px #0f0; margin: 20px auto; }
        .recording-dot { height: 10px; width: 10px; background-color: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div>
        <h2><span class="recording-dot"></span> LIVE SOURCE</h2>
        <video id="localVideo" autoplay playsinline muted></video>
        <p id="status">Starting Auto-Stream...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7gABQ1j1zMFS9AylLCZr-K1hyK0LkIsQ",
            authDomain: "distark.firebaseapp.com",
            projectId: "distark",
            storageBucket: "distark.firebasestorage.app",
            messagingSenderId: "819241583845",
            appId: "1:819241583845:web:2231e652310e47e06cc00c",
            measurementId: "G-X175B7NX2K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const pc = new RTCPeerConnection({ iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] });

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                stream.getTracks().forEach(track => pc.addTrack(track, stream));
                document.getElementById('localVideo').srcObject = stream;

                const callDoc = doc(db, 'calls', 'active-session');
                const offerCandidates = collection(callDoc, 'offerCandidates');

                pc.onicecandidate = e => e.candidate && addDoc(offerCandidates, e.candidate.toJSON());

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                await setDoc(callDoc, { 
                    offer: { sdp: offer.sdp, type: offer.type },
                    status: 'online',
                    timestamp: Date.now()
                });

                document.getElementById('status').innerText = "System Online: Transmitting...";

                onSnapshot(callDoc, snap => {
                    const data = snap.data();
                    if (!pc.currentRemoteDescription && data?.answer) {
                        pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    }
                });
            } catch (e) {
                document.getElementById('status').innerText = "Error: Please allow camera access.";
            }
        }
        window.onclick = () => init(); // Browser requirement: Click once to start media
        document.body.innerHTML += '<p style="color:white">Click anywhere on screen to start</p>';
    </script>
</body>
</html>
